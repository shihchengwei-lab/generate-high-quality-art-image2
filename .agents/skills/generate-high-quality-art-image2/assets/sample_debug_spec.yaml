asset_name: example_reference_guided_debug
task_type: reference_guided_image
execution_mode: debug
debug_export_prompt: true
run_generation: true
intended_use: reference-guided high-quality finished image
image_type: reference_guided_image
reference_images:
  - path: ./refs/style-board.png
    role: style
  - path: ./refs/object-design.png
    role: costume_object
preserve:
  - line language and restrained color handling from the style reference
  - object silhouette, material layering, and ornament structure from the object reference
change:
  - create a new tabletop product-like image
  - use a clean studio surface and soft side lighting from user text
ignore:
  - original subject and scene from the style reference
  - camera, background, and lighting from the object reference
  - random text, labels, logos, UI, and extra props
subject:
  description: a compact brass compass with a translucent blue cover
  details:
    - readable circular form
    - engraved edge marks without visible text
    - clean metallic rim
composition:
  framing: centered three-quarter close-up
  camera: slightly above the object
  layout: single finished image
  aspect_ratio: 1:1
scene_direction:
  environment: minimal matte stone surface
  lighting: soft side light with gentle reflection
  atmosphere: precise and calm
style_direction:
  rendering: polished illustrative realism
  detail_density: medium, controlled
model:
  name: gpt-image-2
  quality: high
  size: 1024x1024
  output_format: png
negative_profile:
  mode: auto
